name: Android â€” Ship to Firebase App Distribution

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - '.github/workflows/firebase-distribution.yml'
  workflow_dispatch:
    inputs:
      release_notes:
        description: Release notes shown to testers
        required: false
        default: New build from main

concurrency:
  group: firebase-distribution
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ship:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.5
          cache: true

      - name: Install Firebase CLI
        run: |
          curl -sL https://firebase.tools | bash
          firebase --version

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$HOME/upload-keystore.jks"
          echo "KEYSTORE_PATH=$HOME/upload-keystore.jks" >> $GITHUB_ENV

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          EOF

      - name: Bump build number
        id: bump
        run: |
          line=$(grep '^version:' pubspec.yaml)
          name=$(echo "$line" | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+.*/\1/')
          code=$(echo "$line" | sed -E 's/^version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+).*/\1/')
          new_code=$((code + 1))
          sed -i "s/^version:.*/version: $name+$new_code/" pubspec.yaml
          echo "version=$name+$new_code" >> $GITHUB_OUTPUT
          echo "Bumped to $name+$new_code"

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve release notes
        id: notes
        run: |
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            notes="${{ github.event.inputs.release_notes }}"
          else
            notes="$(git log -1 --pretty=format:'%s')"
          fi
          # Escape for the JSON / shell pipeline
          notes_clean=$(echo "$notes" | tr '\n' ' ' | sed 's/"/\\"/g')
          echo "value=$notes_clean" >> $GITHUB_OUTPUT

      - name: Distribute to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::FIREBASE_TOKEN or FIREBASE_ANDROID_APP_ID secret is missing"
            exit 1
          fi
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --release-notes "${{ steps.notes.outputs.value }}" \
            --groups "arafat-test" \
            --token "$FIREBASE_TOKEN"

      - name: Commit version bump back to main
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git push

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.bump.outputs.version }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30
