name: Android — Build & Ship to Closed Testing

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:
    inputs:
      track:
        description: Play Console track to upload to
        required: true
        default: alpha
        type: choice
        options:
          - alpha           # Closed testing
          - beta            # Open testing
          - production      # Production (10% staged)
          - dryrun          # Validate only, no upload

concurrency:
  group: android-release
  cancel-in-progress: false   # never cancel an in-flight upload

permissions:
  contents: write             # for the auto-bump commit

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.5
          cache: true

      - name: Set up Ruby (for fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$HOME/upload-keystore.jks"
          echo "KEYSTORE_PATH=$HOME/upload-keystore.jks" >> $GITHUB_ENV

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$KEYSTORE_PATH
          EOF

      - name: Write Play Console service account JSON
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is not set"
            exit 1
          fi
          mkdir -p android/fastlane
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > android/fastlane/play-store-service-account.json

      - name: Bump build number
        id: bump
        run: |
          # Find current version (e.g. 1.1.0+2), increment +N, write back
          line=$(grep '^version:' pubspec.yaml)
          name=$(echo "$line" | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+.*/\1/')
          code=$(echo "$line" | sed -E 's/^version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+).*/\1/')
          new_code=$((code + 1))
          sed -i "s/^version:.*/version: $name+$new_code/" pubspec.yaml
          echo "version=$name+$new_code" >> $GITHUB_OUTPUT
          echo "Bumped to $name+$new_code"

      - name: Resolve target track
        id: track
        run: |
          track="${{ github.event.inputs.track }}"
          if [ -z "$track" ] || [ "$track" = "null" ]; then track="alpha"; fi
          echo "value=$track" >> $GITHUB_OUTPUT

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload to Play Console
        working-directory: android
        run: |
          case "${{ steps.track.outputs.value }}" in
            dryrun) fastlane closed_dryrun ;;
            alpha)  fastlane closed_rollout ;;
            beta)   fastlane promote_closed_to_open ;;
            production) fastlane promote_to_production ;;
            *) echo "Unknown track"; exit 1 ;;
          esac

      - name: Commit version bump back to main
        if: steps.track.outputs.value != 'dryrun' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.version }} [skip ci]" || echo "nothing to commit"
          git push

      - name: Upload .aab as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.bump.outputs.version }}.aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30
