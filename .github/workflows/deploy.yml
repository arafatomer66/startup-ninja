name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, interactive-trackers]
  workflow_dispatch:

# Allow only one concurrent deployment, skip queued runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.5
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        # GitHub Pages serves project sites at https://<user>.github.io/<repo>/
        # so the base-href must include the repo name.
        run: |
          flutter build web \
            --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --pwa-strategy=offline-first

      - name: Add 404 fallback for SPA routing
        # GitHub Pages serves 404.html for unknown paths; copying index.html lets
        # GetX deep links work after a page refresh.
        run: cp build/web/index.html build/web/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
